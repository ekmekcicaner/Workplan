server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.wasm$ {
        default_type application/wasm;
    }

    # Blazor WASM is client-side routed; unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
