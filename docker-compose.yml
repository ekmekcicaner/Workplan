# Local IDE debug için:
#   docker compose up -d db
#
# Tam Docker stack için:
#   docker compose --profile app up --build
#
# Ardından:
#   Local Client : http://localhost:5276
#   Local API    : http://localhost:5291/scalar
#   Docker Client: http://localhost:5277
#   Docker API   : http://localhost:5292/scalar
#   PostgreSQL   : localhost:5433
#   Giriş  : admin@workplan.local / ChangeMe123! (SystemAdmin)
#            veya pm1@workplan.local / Demo123! (ProjectManager)
#            veya hom1@workplan.local / Demo123! (HeadOfMaster) vb. seed edilen kullanıcılar
#
# Veritabanı ilk açılışta migration'lar ile kurulur ve elektrik santrali inşaatı
# senaryosuna uygun mock veri (proje, bölgeler, ekipler, günlük planlar) otomatik eklenir.

services:
  db:
    image: postgres:16-alpine
    container_name: workplan-db
    environment:
      POSTGRES_DB: workplan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - workplan-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workplan"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Workplan.WebApi/Dockerfile
    container_name: workplan-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=db;Port=5432;Database=workplan;Username=postgres;Password=postgres"
      SeedDemoData: "true"
    ports:
      - "5292:8080"
    depends_on:
      db:
        condition: service_healthy

  client:
    profiles: ["app"]
    build:
      context: .
      dockerfile: src/Workplan.Client/Dockerfile
    container_name: workplan-client
    ports:
      - "5277:80"
    depends_on:
      - api

volumes:
  workplan-db-data:
